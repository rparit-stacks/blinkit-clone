spring.application.name=backend
server.port=8080

# JWT
jwt.secret=f749a4be22190cd89c3e8f01a38c35ae94383d0b2195bd7262342316731e8c3e
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-ms=2592000000

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS (admin Vite on 8081; add your LAN IP if it changes)
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8081,http://192.168.1.14:8081,http://localhost:8082,http://localhost:4173,http://localhost:5174,http://localhost:5175,http://localhost:5176

# Dev mode - OTP returned in response body
app.dev-mode=true

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID:}

# Razorpay (test keys — replace with live keys in production)
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:placeholder_secret}

# File uploads (local storage)
upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.mvc.static-path-pattern=/uploads/**

# Notification microservice (Vercel)
notification.service.url=${NOTIFICATION_SERVICE_URL:https://nainital-notification-queue.vercel.app}
notification.service.api-key=${NOTIFICATION_SERVICE_API_KEYS:9810167696}
notification.service.enabled=${NOTIFICATION_SERVICE_ENABLED:true}

# Pricing rules
order.delivery-fee-threshold=500
order.delivery-fee=30
order.tax-rate=0.05
