spring.application.name=backend
server.port=8080

# JWT
jwt.secret=f749a4be22190cd89c3e8f01a38c35ae94383d0b2195bd7262342316731e8c3e
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-ms=2592000000

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8081,http://localhost:8082,http://localhost:4173,http://localhost:5174,http://localhost:5175

# Dev mode - OTP returned in response body
app.dev-mode=true

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID:}

# Razorpay (test keys — replace with live keys in production)
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:placeholder_secret}

# Pricing rules
order.delivery-fee-threshold=500
order.delivery-fee=30
order.tax-rate=0.05
